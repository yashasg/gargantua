rules:
  - id: example_cache
    name: Example Cache
    paths:
      - "~/Library/Caches/com.example.app"
    safety: safe
    confidence: 98
    explanation: "Disposable cache files regenerated automatically on next launch."
    source:
      name: Example App
      bundle_id: com.example.app
      verify_signature: true
    regenerates: true
    category: app_cache
    tags:
      - app
      - example
      - cache

  - id: example_local_storage
    name: Example Local Storage
    paths:
      - "~/Library/Application Support/Example/Local Storage"
    safety: review
    confidence: 75
    explanation: "May contain user state, local preferences, or session data. Review before removing."
    source:
      name: Example App
      bundle_id: com.example.app
      verify_signature: true
    regenerates: false
    category: app_data
    tags:
      - app
      - example
      - user_data
    safety_overrides:
      - condition: "age > 90d"
        safety: safe
        confidence: 85
        explanation_suffix: "No activity in 90+ days — likely abandoned app state."
        profiles:
          - deep
