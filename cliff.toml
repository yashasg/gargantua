# git-cliff ~ configuration
# https://git-cliff.org/docs/configuration
#
# Generates Keep a Changelog-formatted release notes from Conventional Commits.
# Used standalone (`git cliff --unreleased`) and wired into Scripts/release-interactive.sh
# so each release's notes are derived from its commits.

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
# One block per release. `<!-- N -->` group prefixes set ordering and are
# stripped from the rendered heading via `striptags`.
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}
{%- endfor %}
{% endfor -%}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
protect_breaking_commits = true
commit_parsers = [
    { message = "^Merge", skip = true },
    { message = "^feat", group = "<!-- 0 -->Added" },
    { message = "^fix", group = "<!-- 1 -->Fixed" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^harden", group = "<!-- 3 -->Security" },
    { message = "^sec", group = "<!-- 3 -->Security" },
    { message = "^revert", group = "<!-- 4 -->Reverted" },
    { message = "^docs?", skip = true },
    { message = "^style", skip = true },
    { message = "^test", skip = true },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^build", skip = true },
    { message = "^.*", group = "<!-- 5 -->Changed" },
]
