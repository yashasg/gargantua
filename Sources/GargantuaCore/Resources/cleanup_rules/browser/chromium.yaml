rules:
  - id: chromium_cache
    name: Chromium Browser Cache
    paths:
      - "~/Library/Caches/Chromium"
      - "~/Library/Caches/Chromium/*/Cache"
    safety: safe
    confidence: 98
    explanation: "Chromium browser cache files regenerated automatically on next visit. No user data lost."
    source:
      name: Chromium
      bundle_id: org.chromium.Chromium
      verify_signature: true
    regenerates: true
    category: browser_cache
    tags:
      - browser
      - cache
      - chromium
    safety_overrides:
      - condition: "age > 30d"
        safety: safe
        confidence: 99
        explanation_suffix: "Cache untouched for 30+ days -- very safe to remove."
        profiles:
          - developer
          - deep

  - id: chromium_code_cache
    name: Chromium Code Cache
    paths:
      - "~/Library/Caches/Chromium/*/Code Cache"
    safety: safe
    confidence: 97
    explanation: "Compiled JavaScript and WebAssembly cache. Rebuilt transparently on revisit."
    source:
      name: Chromium
      bundle_id: org.chromium.Chromium
      verify_signature: true
    regenerates: true
    category: browser_cache
    tags:
      - browser
      - cache
      - chromium

  - id: chromium_service_worker
    name: Chromium Service Worker Cache
    paths:
      - "~/Library/Application Support/Chromium/*/Service Worker/CacheStorage"
      - "~/Library/Application Support/Chromium/*/Service Worker/ScriptCache"
    safety: safe
    confidence: 95
    explanation: "Service worker cache data. Sites re-register workers and redownload cache entries on next visit."
    source:
      name: Chromium
      bundle_id: org.chromium.Chromium
      verify_signature: true
    regenerates: true
    category: browser_cache
    tags:
      - browser
      - cache
      - chromium

  - id: chromium_local_storage
    name: Chromium Local Storage
    paths:
      - "~/Library/Application Support/Chromium/*/Local Storage"
    safety: review
    confidence: 75
    explanation: "Website local storage may contain login tokens and preferences. Review before removing."
    source:
      name: Chromium
      bundle_id: org.chromium.Chromium
      verify_signature: true
    regenerates: false
    category: browser_data
    tags:
      - browser
      - user_data
      - chromium
    safety_overrides:
      - condition: "age > 90d"
        safety: safe
        confidence: 85
        explanation_suffix: "No browser activity in 90+ days -- likely abandoned site data."
        profiles:
          - deep
