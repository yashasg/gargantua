rules:
  - id: chrome_cache
    name: Chrome Browser Cache
    paths:
      - "~/Library/Caches/Google/Chrome"
      - "~/Library/Caches/Google/Chrome/Default/Cache"
      - "~/Library/Application Support/Google/Chrome/*/Application Cache"
      - "~/Library/Application Support/Google/Chrome/*/GPUCache"
      - "~/Library/Application Support/Google/Chrome/ShaderCache"
      - "~/Library/Application Support/Google/Chrome/GrShaderCache"
      - "~/Library/Application Support/Google/Chrome/GraphiteDawnCache"
    safety: safe
    confidence: 98
    explanation: "Browser cache files regenerated automatically on next visit. No user data lost."
    source:
      name: Google Chrome
      bundle_id: com.google.Chrome
      verify_signature: true
    regenerates: true
    category: browser_cache
    tags:
      - browser
      - cache
    safety_overrides:
      - condition: "age > 30d"
        safety: safe
        confidence: 99
        explanation_suffix: "Cache untouched for 30+ days — very safe to remove."
        profiles:
          - developer
          - deep

  - id: chrome_code_cache
    name: Chrome Code Cache
    paths:
      - "~/Library/Caches/Google/Chrome/Default/Code Cache"
    safety: safe
    confidence: 97
    explanation: "Compiled JavaScript/WebAssembly cache. Rebuilt transparently on revisit."
    source:
      name: Google Chrome
      bundle_id: com.google.Chrome
      verify_signature: true
    regenerates: true
    category: browser_cache
    tags:
      - browser
      - cache

  - id: chrome_service_worker
    name: Chrome Service Worker Cache
    paths:
      - "~/Library/Caches/Google/Chrome/Default/Service Worker"
      - "~/Library/Application Support/Google/Chrome/*/Service Worker/CacheStorage"
      - "~/Library/Application Support/Google/Chrome/*/Service Worker/ScriptCache"
    safety: safe
    confidence: 95
    explanation: "Service worker and CacheStorage data. Sites re-download on next visit."
    source:
      name: Google Chrome
      bundle_id: com.google.Chrome
      verify_signature: true
    regenerates: true
    category: browser_cache
    tags:
      - browser
      - cache

  - id: chrome_local_storage
    name: Chrome Local Storage
    paths:
      - "~/Library/Application Support/Google/Chrome/Default/Local Storage"
    safety: review
    confidence: 75
    explanation: "Website local storage may contain login tokens and preferences. Review before removing."
    source:
      name: Google Chrome
      bundle_id: com.google.Chrome
      verify_signature: true
    regenerates: false
    category: browser_data
    tags:
      - browser
      - user_data
    safety_overrides:
      - condition: "age > 90d"
        safety: safe
        confidence: 85
        explanation_suffix: "No browser activity in 90+ days — likely abandoned site data."
        profiles:
          - deep

  - id: chrome_extensions_cache
    name: Chrome Extensions Cache
    paths:
      - "~/Library/Caches/Google/Chrome/Default/Extensions"
      - "~/Library/Application Support/Google/Chrome/component_crx_cache"
    safety: safe
    confidence: 90
    explanation: "Cached extension assets. Extensions re-download from Chrome Web Store."
    source:
      name: Google Chrome
      bundle_id: com.google.Chrome
      verify_signature: true
    regenerates: true
    category: browser_cache
    tags:
      - browser
      - extensions
      - cache

  - id: chrome_google_updater_cache
    name: GoogleUpdater Browser CRX Cache
    paths:
      - "~/Library/Application Support/Google/GoogleUpdater/crx_cache"
      - "~/Library/Application Support/Google/GoogleUpdater/*.old"
    safety: safe
    confidence: 92
    explanation: "Google browser updater CRX cache and stale updater sidecar files. Recreated by GoogleUpdater."
    source:
      name: GoogleUpdater
    regenerates: true
    category: browser_cache
    tags:
      - browser
      - cache
      - updater

  - id: chrome_puppeteer_cache
    name: Puppeteer Browser Cache
    paths:
      - "~/.cache/puppeteer"
    safety: safe
    confidence: 94
    explanation: "Downloaded browser binaries used by Puppeteer. Puppeteer downloads them again when needed."
    source:
      name: Puppeteer
    regenerates: true
    regenerate_command: "npx puppeteer browsers install"
    category: browser_cache
    tags:
      - browser
      - cache
      - puppeteer
