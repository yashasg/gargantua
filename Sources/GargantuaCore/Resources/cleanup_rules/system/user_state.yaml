rules:
  - id: finder_ds_store_files
    name: Finder .DS_Store Files
    paths:
      - "**/.DS_Store"
    safety: safe
    confidence: 92
    explanation: "Finder folder-view metadata files. Finder recreates them when folders are viewed again."
    source:
      name: Finder
      bundle_id: com.apple.finder
      verify_signature: true
    regenerates: true
    category: system_cache
    tags:
      - system
      - finder
      - metadata
      - cache

  - id: apple_double_metadata_files
    name: AppleDouble Metadata Files
    paths:
      - "**/._*"
    safety: review
    confidence: 68
    explanation: "AppleDouble sidecar metadata can contain resource-fork or extended-attribute data, especially on non-native volumes."
    source:
      name: macOS filesystem metadata
    regenerates: false
    category: system_cache
    tags:
      - system
      - finder
      - metadata
      - review

  - id: recent_items_lists
    name: Recent Items Lists
    paths:
      - "~/Library/Application Support/com.apple.sharedfilelist/com.apple.LSSharedFileList.RecentApplications.sfl2"
      - "~/Library/Application Support/com.apple.sharedfilelist/com.apple.LSSharedFileList.RecentDocuments.sfl2"
      - "~/Library/Application Support/com.apple.sharedfilelist/com.apple.LSSharedFileList.RecentServers.sfl2"
      - "~/Library/Application Support/com.apple.sharedfilelist/com.apple.LSSharedFileList.RecentHosts.sfl2"
      - "~/Library/Application Support/com.apple.sharedfilelist/com.apple.LSSharedFileList.RecentApplications.sfl"
      - "~/Library/Application Support/com.apple.sharedfilelist/com.apple.LSSharedFileList.RecentDocuments.sfl"
      - "~/Library/Application Support/com.apple.sharedfilelist/com.apple.LSSharedFileList.RecentServers.sfl"
      - "~/Library/Application Support/com.apple.sharedfilelist/com.apple.LSSharedFileList.RecentHosts.sfl"
      - "~/Library/Preferences/com.apple.recentitems.plist"
    safety: review
    confidence: 80
    explanation: "Recent item lists are regenerated by macOS, but clearing them changes user-visible history."
    source:
      name: macOS shared file lists
      verify_signature: true
    regenerates: true
    category: app_data
    tags:
      - system
      - finder
      - recent_items
      - privacy
      - review

  - id: saved_application_states
    name: Saved Application States
    paths:
      - "~/Library/Saved Application State"
    pattern: "*.savedState"
    match_filters:
      - "mtime > 30d"
    safety: review
    confidence: 82
    explanation: "Old application saved-state folders. Review because they can affect restored windows and app launch context."
    source:
      name: macOS Resume
      verify_signature: true
    regenerates: true
    category: app_data
    tags:
      - system
      - app_state
      - review
    safety_overrides:
      - condition: "age > 90d"
        safety: safe
        confidence: 90
        explanation_suffix: "Saved state has been inactive for 90+ days."
        profiles:
          - deep

  - id: autosave_information
    name: Autosave Information
    paths:
      - "~/Library/Autosave Information"
    pattern: "*"
    match_filters:
      - "mtime > 30d"
    safety: review
    confidence: 72
    explanation: "Autosave information can contain recovery state for user documents. Review before removing old entries."
    source:
      name: macOS autosave
      verify_signature: true
    regenerates: false
    category: app_data
    tags:
      - system
      - autosave
      - recovery
      - review

  - id: safari_incomplete_downloads
    name: Safari Incomplete Downloads
    paths:
      - "~/Downloads"
    pattern: "*.download"
    match_filters:
      - "mtime > 7d"
    safety: review
    confidence: 80
    explanation: "Old incomplete Safari downloads. Review because Gargantua cannot yet verify open file handles from YAML."
    source:
      name: Safari
      bundle_id: com.apple.Safari
      verify_signature: true
    regenerates: false
    category: temp_files
    tags:
      - system
      - downloads
      - temp
      - review

  - id: chromium_incomplete_downloads
    name: Chromium Incomplete Downloads
    paths:
      - "~/Downloads"
    pattern: "*.crdownload"
    match_filters:
      - "mtime > 7d"
    safety: review
    confidence: 80
    explanation: "Old incomplete Chromium-family downloads. Review because Gargantua cannot yet verify open file handles from YAML."
    source:
      name: Chromium browsers
    regenerates: false
    category: temp_files
    tags:
      - system
      - downloads
      - temp
      - review

  - id: partial_incomplete_downloads
    name: Partial Incomplete Downloads
    paths:
      - "~/Downloads"
    pattern: "*.part"
    match_filters:
      - "mtime > 7d"
    safety: review
    confidence: 78
    explanation: "Old partial download files. Review because they may belong to paused downloads."
    source:
      name: Download managers
    regenerates: false
    category: temp_files
    tags:
      - system
      - downloads
      - temp
      - review

  - id: mail_downloads_old
    name: Old Mail Downloads
    paths:
      - "~/Library/Mail Downloads/*"
      - "~/Library/Containers/com.apple.mail/Data/Library/Mail Downloads/*"
    match_filters:
      - "mtime > 30d"
    safety: review
    confidence: 78
    explanation: "Old downloaded Mail attachments can be regenerated only if the original message remains available."
    source:
      name: Apple Mail
      bundle_id: com.apple.mail
      verify_signature: true
    regenerates: false
    category: app_data
    tags:
      - system
      - mail
      - attachments
      - review

  - id: application_support_logs_caches
    name: Application Support Logs and Caches
    paths:
      - "~/Library/Application Support/*/log"
      - "~/Library/Application Support/*/logs"
      - "~/Library/Application Support/*/activitylog"
      - "~/Library/Application Support/*/Cache/Cache_Data"
      - "~/Library/Application Support/*/Crashpad/completed"
      - "~/Library/Group Containers/group.com.apple.contentdelivery/Logs"
      - "~/Library/Group Containers/group.com.apple.contentdelivery/Library/Logs"
    safety: review
    confidence: 82
    explanation: "Common app support log and cache folders. Review because Application Support often sits near user state."
    source:
      name: Application Support
    regenerates: true
    category: app_cache
    tags:
      - app
      - application_support
      - logs
      - cache
      - review

  - id: group_container_logs_caches
    name: Group Container Logs and Caches
    paths:
      - "~/Library/Group Containers/*/Logs"
      - "~/Library/Group Containers/*/Library/Logs"
      - "~/Library/Group Containers/*/Caches"
      - "~/Library/Group Containers/*/Library/Caches"
      - "~/Library/Group Containers/*/tmp"
      - "~/Library/Group Containers/*/Library/tmp"
    exclude:
      - "*Group Containers/com.apple.*"
      - "*Group Containers/group.com.apple.*"
      - "*Group Containers/systemgroup.com.apple.*"
    safety: review
    confidence: 74
    explanation: "Shared app-group log, cache, and temp directories. Review because shared containers can hold cross-app state."
    source:
      name: macOS Group Containers
    regenerates: true
    category: app_cache
    tags:
      - app
      - group_container
      - logs
      - cache
      - temp
      - review
