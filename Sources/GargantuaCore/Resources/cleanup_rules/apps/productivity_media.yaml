      - "~/Library/Caches/com.reincubate.camo"
      - "~/Library/Caches/com.xnipapp.xnip"
      - "~/Library/Caches/com.readdle.smartemail-Mac"
      - "~/Library/Caches/com.airmail.*"
      - "~/Library/Caches/com.todoist.mac.Todoist"
      - "~/Library/Caches/com.any.do.*"
    safety: safe
    confidence: 89
    explanation: "Translation, capture, email-client, and task-app cache directories from Mole. User documents and account data are excluded."
    source:
      name: Utility and productivity apps
    regenerates: true
    category: app_cache
    tags:
      - app
      - productivity
      - utilities
      - cache
