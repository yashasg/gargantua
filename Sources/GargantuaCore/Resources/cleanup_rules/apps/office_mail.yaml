rules:
  - id: microsoft_word_caches
    name: Microsoft Word Caches
    paths:
      - "~/Library/Caches/com.microsoft.Word"
      - "~/Library/Containers/com.microsoft.Word/Data/Library/Caches"
      - "~/Library/Containers/com.microsoft.Word/Data/tmp"
      - "~/Library/Containers/com.microsoft.Word/Data/Library/Logs"
    skip_if_process_running:
      - com.microsoft.Word
      - Microsoft Word
    safety: safe
    confidence: 94
    explanation: "Word cache, temporary, and container log directories from Mole. Documents, AutoRecovery, templates, and preferences are excluded."
    source:
      name: Microsoft Word
      bundle_id: com.microsoft.Word
      verify_signature: true
    regenerates: true
    category: app_cache
    tags:
      - app
      - office
      - microsoft
      - word
      - cache
      - logs

