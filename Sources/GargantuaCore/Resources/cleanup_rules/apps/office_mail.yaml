    skip_if_process_running:
      - com.microsoft.Excel
      - Microsoft Excel
    safety: safe
    confidence: 94
    explanation: "Excel cache, temporary, and container log directories from Mole. Workbooks, AutoRecovery, templates, and preferences are excluded."
    source:
