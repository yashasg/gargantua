rules:
  - id: discord_legcord_caches
    name: Discord and Legcord Caches
    paths:
      - "~/Library/Application Support/discord/Cache"
      - "~/Library/Application Support/legcord/Cache"
    safety: safe
    confidence: 94
    explanation: "Electron cache directories for Discord-compatible clients from Mole. Account state and downloaded user files are excluded."
    source:
      name: Discord and Legcord
    regenerates: true
    category: app_cache
    tags:
      - app
      - communication
      - discord
      - legcord
      - cache

