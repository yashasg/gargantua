# Raycast — app-specific uninstall pack
#
# Bundle: com.raycast.macos
#
# Trust Layer classification (per app_pack contract):
#   - safe       : narrow URL/file-system caches and logs.
#   - review     : extension installs and general support state that may be
#                  regenerated but can encode workspace setup.
#   - protected  : clipboard/history databases and user automation such as
#                  scripts, snippets, and quick links.
#
# Do-not-touch carve-outs:
#   - Clipboard history, search history, snippets, quick links, and scripts
#     are never considered disposable cache.
#   - Generic Application Support matching is intentionally narrowed by this
#     pack so curated Raycast rows explain sensitive state explicitly.
remnant_rules:

  - id: raycast_transient_caches
    name: Raycast transient caches
    category: caches
    path_templates:
      - "~/Library/Caches/com.raycast.macos/urlcache"
      - "~/Library/Caches/com.raycast.macos/fsCachedData"
      - "~/Library/Caches/com.raycast.macos/com.raycast.macos.ShipIt"
    confidence: 92
    explanation: Raycast URL, filesystem, and updater caches; regenerated by Raycast after reinstall.
    source:
      name: Raycast
      bundle_id: com.raycast.macos
    applies_to:
      bundle_ids:
        - com.raycast.macos
    regenerates: true
    tags: [app_pack, raycast, launcher, automation, cache]

  - id: raycast_logs
    name: Raycast logs
    category: logs
    path_templates:
      - "~/Library/Logs/Raycast"
      - "~/Library/Application Support/com.raycast.macos/logs"
    confidence: 95
    explanation: Raycast diagnostic logs; safe to remove after uninstall.
    source:
      name: Raycast
      bundle_id: com.raycast.macos
    applies_to:
      bundle_ids:
        - com.raycast.macos
    regenerates: true
    tags: [app_pack, raycast, launcher, automation, logs]

  - id: raycast_support_state
    name: Raycast support state
    category: support_files
    path_templates:
      - "~/Library/Application Support/com.raycast.macos"
    exclude:
      - "Clipboard*"
      - "clipboard*"
      - "History*"
      - "history*"
      - "Raycast.sqlite*"
      - "raycast.sqlite*"
      - "Local Storage"
      - "Cookies"
      - "*.binarycookies"
      - "extensions"
      - "Extensions"
      - "scripts"
      - "Scripts"
      - "snippets"
      - "Snippets"
      - "quicklinks"
      - "Quicklinks"
      - "Quick Links"
      - "logs"
      - "Logs"
    safety: review
    confidence: 72
    explanation: Raycast support data after sensitive history, cookies, extensions, scripts, snippets, quick links, and logs are carved out; review before removal.
    source:
      name: Raycast
      bundle_id: com.raycast.macos
    applies_to:
      bundle_ids:
        - com.raycast.macos
    regenerates: false
    tags: [app_pack, raycast, launcher, automation, support]

  - id: raycast_extensions_review
    name: Raycast installed extensions
    category: support_files
    path_templates:
      - "~/Library/Application Support/com.raycast.macos/extensions"
    safety: review
    confidence: 76
    explanation: Raycast installed extensions and extension state; review because extensions can encode workspace setup, licenses, and local preferences.
    source:
      name: Raycast
      bundle_id: com.raycast.macos
    applies_to:
      bundle_ids:
        - com.raycast.macos
    regenerates: false
    tags: [app_pack, raycast, launcher, automation, extensions]

  - id: raycast_preferences_review
    name: Raycast preferences
    category: preferences
    path_templates:
      - "~/Library/Preferences/com.raycast.macos.plist"
    safety: review
    confidence: 78
    explanation: Raycast preferences and account-adjacent settings; review before removal.
    source:
      name: Raycast
      bundle_id: com.raycast.macos
    applies_to:
      bundle_ids:
        - com.raycast.macos
    regenerates: false
    tags: [app_pack, raycast, launcher, automation, preferences]

  - id: raycast_sensitive_history_protected
    name: Raycast clipboard, history, and local storage
    category: other
    path_templates:
      - "~/Library/Application Support/com.raycast.macos/clipboard"
      - "~/Library/Application Support/com.raycast.macos/Clipboard"
      - "~/Library/Application Support/com.raycast.macos/history"
      - "~/Library/Application Support/com.raycast.macos/History"
      - "~/Library/Application Support/com.raycast.macos/Raycast.sqlite"
      - "~/Library/Application Support/com.raycast.macos/Raycast.sqlite-shm"
      - "~/Library/Application Support/com.raycast.macos/Raycast.sqlite-wal"
      - "~/Library/Application Support/com.raycast.macos/Local Storage"
      - "~/Library/Application Support/com.raycast.macos/Cookies"
      - "~/Library/Application Support/com.raycast.macos/Cookies.binarycookies"
    safety: protected
    confidence: 78
    explanation: Raycast clipboard history, command history, local databases, cookies, and browser-like storage. Protected because this can expose sensitive user activity and account state.
    source:
      name: Raycast
      bundle_id: com.raycast.macos
    applies_to:
      bundle_ids:
        - com.raycast.macos
    regenerates: false
    tags: [app_pack, raycast, launcher, automation, history, clipboard, protected]

  - id: raycast_user_automation_protected
    name: Raycast user automation
    category: other
    path_templates:
      - "~/Library/Application Support/com.raycast.macos/scripts"
      - "~/Library/Application Support/com.raycast.macos/Scripts"
      - "~/Library/Application Support/com.raycast.macos/snippets"
      - "~/Library/Application Support/com.raycast.macos/Snippets"
      - "~/Library/Application Support/com.raycast.macos/quicklinks"
      - "~/Library/Application Support/com.raycast.macos/Quicklinks"
      - "~/Library/Application Support/com.raycast.macos/Quick Links"
    safety: protected
    confidence: 76
    explanation: Raycast user-authored scripts, snippets, and quick links. Protected because rebuilding automation by hand is high effort and may include sensitive commands or URLs.
    source:
      name: Raycast
      bundle_id: com.raycast.macos
    applies_to:
      bundle_ids:
        - com.raycast.macos
    regenerates: false
    tags: [app_pack, raycast, launcher, automation, scripts, protected]
