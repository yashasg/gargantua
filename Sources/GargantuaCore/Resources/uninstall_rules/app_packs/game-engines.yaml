# Unity / Unreal Engine / Godot — app-specific uninstall pack
#
# Bundles:
#   com.unity3d.unityhub              (Unity Hub)
#   com.unity3d.UnityEditor5.x        (Unity Editor family)
#   com.epicgames.EpicGamesLauncher   (Epic Games Launcher)
#   com.epicgames.UnrealEditor        (Unreal Editor)
#   org.godotengine.godot             (Godot)
#   org.godotengine.godot4            (Godot 4)
#
# Trust Layer classification (per app_pack contract):
#   - safe       : narrow caches and logs that rebuild after launch or build.
#   - review     : editor support state, export templates, DerivedDataCache,
#                  launcher state, and downloaded templates; these are
#                  reproducible but can be expensive or version-pinned.
#   - protected  : common project roots. Uninstalling an editor must never
#                  imply deleting user projects or shared engine workspaces.
#
# Do-not-touch carve-outs:
#   - Unity/Unreal/Godot project directories are surfaced as protected roots
#     when the common folders exist; users can remove them manually if that is
#     truly intended.
#   - Engine installs under /Applications, Epic vault cache/library roots, and
#     Unity Asset Store packages are not marked safe because they may be shared
#     across projects or take a long time to recreate.
remnant_rules:

  - id: unity_engine_caches
    name: Unity editor and Hub caches
    category: caches
    path_templates:
      - "~/Library/Caches/com.unity3d.*"
      - "~/Library/Caches/unityhub-updater"
    confidence: 92
    explanation: Unity editor and Hub caches; regenerated by Unity Hub or the editor after reinstall.
    source:
      name: Unity
    applies_to:
      bundle_ids:
        - com.unity3d.unityhub
        - com.unity3d.UnityEditor
        - com.unity3d.UnityEditor5.x
    regenerates: true
    tags: [app_pack, unity, game_engine, cache]

  - id: unity_engine_logs
    name: Unity editor and Hub logs
    category: logs
    path_templates:
      - "~/Library/Logs/Unity"
      - "~/Library/Logs/UnityHub"
      - "~/Library/Application Support/UnityHub/logs"
    confidence: 95
    explanation: Unity editor and Hub diagnostic logs; safe to remove after uninstall.
    source:
      name: Unity
    applies_to:
      bundle_ids:
        - com.unity3d.unityhub
        - com.unity3d.UnityEditor
        - com.unity3d.UnityEditor5.x
    regenerates: true
    tags: [app_pack, unity, game_engine, logs]

  - id: unity_hub_support_state
    name: Unity Hub support state
    category: support_files
    path_templates:
      - "~/Library/Application Support/UnityHub"
    exclude:
      - "logs"
      - "logs/**"
    safety: review
    confidence: 76
    explanation: Unity Hub settings, install metadata, account-adjacent state, and package catalog state; review before removal.
    source:
      name: Unity Hub
      bundle_id: com.unity3d.unityhub
    applies_to:
      bundle_ids:
        - com.unity3d.unityhub
    regenerates: false
    tags: [app_pack, unity, game_engine, support]

  - id: unity_editor_support_state
    name: Unity editor support state
    category: support_files
    path_templates:
      - "~/Library/Application Support/Unity"
      - "~/Library/Unity"
    safety: review
    confidence: 72
    explanation: Unity editor preferences, package metadata, licensing-adjacent state, and downloaded templates; review because projects may depend on exact editor/package state.
    source:
      name: Unity
    applies_to:
      bundle_ids:
        - com.unity3d.unityhub
        - com.unity3d.UnityEditor
        - com.unity3d.UnityEditor5.x
    regenerates: false
    tags: [app_pack, unity, game_engine, support, templates]

  - id: unity_project_roots_protected
    name: Unity project roots
    category: other
    path_templates:
      - "~/Unity"
      - "~/Unity Projects"
      - "~/Documents/Unity"
      - "~/Documents/Unity Projects"
    safety: protected
    confidence: 70
    explanation: Common Unity project roots. Protected because editor uninstall must not remove user projects, packages, imported assets, or shared workspaces.
    source:
      name: Unity
    applies_to:
      bundle_ids:
        - com.unity3d.unityhub
        - com.unity3d.UnityEditor
        - com.unity3d.UnityEditor5.x
    regenerates: false
    tags: [app_pack, unity, game_engine, projects, protected]

  - id: unreal_launcher_caches
    name: Epic Games Launcher caches
    category: caches
    path_templates:
      - "~/Library/Caches/com.epicgames.EpicGamesLauncher"
      - "~/Library/Application Support/Epic/EpicGamesLauncher/Saved/webcache"
      - "~/Library/Application Support/Epic/EpicGamesLauncher/Saved/webcache_*"
    confidence: 90
    explanation: Epic Games Launcher web and HTTP caches; regenerated by the launcher after reinstall.
    source:
      name: Epic Games Launcher
      bundle_id: com.epicgames.EpicGamesLauncher
    applies_to:
      bundle_ids:
        - com.epicgames.EpicGamesLauncher
        - com.epicgames.UnrealEditor
    regenerates: true
    tags: [app_pack, unreal, epic, game_engine, cache]

  - id: unreal_engine_logs
    name: Unreal Engine and Epic logs
    category: logs
    path_templates:
      - "~/Library/Logs/Unreal Engine"
      - "~/Library/Logs/Epic"
      - "~/Library/Application Support/Epic/EpicGamesLauncher/Saved/Logs"
    confidence: 94
    explanation: Unreal Engine and Epic launcher diagnostic logs; safe to remove after uninstall.
    source:
      name: Unreal Engine
    applies_to:
      bundle_ids:
        - com.epicgames.EpicGamesLauncher
        - com.epicgames.UnrealEditor
    regenerates: true
    tags: [app_pack, unreal, epic, game_engine, logs]

  - id: unreal_derived_data_cache
    name: Unreal DerivedDataCache
    category: caches
    path_templates:
      - "~/Library/Application Support/Epic/UnrealEngine/Common/DerivedDataCache"
      - "~/Library/Application Support/Unreal Engine/Common/DerivedDataCache"
    safety: review
    confidence: 82
    explanation: Unreal shader and asset DerivedDataCache. It can be rebuilt, but rebuilding may be expensive and version-specific, so review before removal.
    source:
      name: Unreal Engine
      bundle_id: com.epicgames.UnrealEditor
    applies_to:
      bundle_ids:
        - com.epicgames.EpicGamesLauncher
        - com.epicgames.UnrealEditor
    regenerates: true
    tags: [app_pack, unreal, game_engine, cache, derived_data]

  - id: unreal_editor_support_state
    name: Unreal Engine support state
    category: support_files
    path_templates:
      - "~/Library/Application Support/Epic/UnrealEngine"
      - "~/Library/Application Support/Unreal Engine"
      - "~/Library/Preferences/Unreal Engine"
    exclude:
      - "Common"
      - "Common/**"
      - "Common/DerivedDataCache"
      - "Common/DerivedDataCache/**"
      - "Saved"
      - "Saved/**"
      - "Saved/Logs"
      - "Saved/Logs/**"
    safety: review
    confidence: 74
    explanation: Unreal editor settings, launcher metadata, marketplace-adjacent state, and version manifests; review because ownership can be shared across projects and engine installs.
    source:
      name: Unreal Engine
    applies_to:
      bundle_ids:
        - com.epicgames.EpicGamesLauncher
        - com.epicgames.UnrealEditor
    regenerates: false
    tags: [app_pack, unreal, epic, game_engine, support]

  - id: unreal_project_roots_protected
    name: Unreal project roots
    category: other
    path_templates:
      - "~/Unreal Projects"
      - "~/Documents/Unreal Projects"
    safety: protected
    confidence: 70
    explanation: Common Unreal project roots. Protected because they can contain source, assets, plugins, generated projects, and shared engine workspaces.
    source:
      name: Unreal Engine
    applies_to:
      bundle_ids:
        - com.epicgames.EpicGamesLauncher
        - com.epicgames.UnrealEditor
    regenerates: false
    tags: [app_pack, unreal, game_engine, projects, protected]

  - id: godot_caches
    name: Godot editor caches
    category: caches
    path_templates:
      - "~/Library/Caches/org.godotengine.godot"
      - "~/Library/Caches/org.godotengine.godot4"
      - "~/Library/Caches/Godot"
    confidence: 92
    explanation: Godot editor caches; regenerated by the editor after reinstall.
    source:
      name: Godot
    applies_to:
      bundle_ids:
        - org.godotengine.godot
        - org.godotengine.godot4
        - org.godotengine.godotsharp
        - org.godotengine.godot.mono
    regenerates: true
    tags: [app_pack, godot, game_engine, cache]

  - id: godot_logs
    name: Godot logs
    category: logs
    path_templates:
      - "~/Library/Logs/Godot"
    confidence: 94
    explanation: Godot editor diagnostic logs; safe to remove after uninstall.
    source:
      name: Godot
    applies_to:
      bundle_ids:
        - org.godotengine.godot
        - org.godotengine.godot4
        - org.godotengine.godotsharp
        - org.godotengine.godot.mono
    regenerates: true
    tags: [app_pack, godot, game_engine, logs]

  - id: godot_editor_state
    name: Godot editor state
    category: support_files
    path_templates:
      - "~/Library/Application Support/Godot"
      - "~/.config/godot"
      - "~/.config/godot4"
      - "~/.config/{appNameVariant}"
      - "~/.local/share/godot"
      - "~/.local/share/godot4"
      - "~/.local/share/{appNameVariant}"
    exclude:
      - "export_templates"
      - "export_templates/**"
      - "templates"
      - "templates/**"
    safety: review
    confidence: 74
    explanation: Godot editor settings, editor data, and local state using common app-name variants; review because it can include project history and editor configuration.
    source:
      name: Godot
    applies_to:
      bundle_ids:
        - org.godotengine.godot
        - org.godotengine.godot4
        - org.godotengine.godotsharp
        - org.godotengine.godot.mono
    regenerates: false
    tags: [app_pack, godot, game_engine, support, variants]

  - id: godot_export_templates
    name: Godot export templates
    category: support_files
    path_templates:
      - "~/Library/Application Support/Godot/export_templates"
      - "~/.local/share/godot/export_templates"
      - "~/.local/share/Godot/export_templates"
    safety: review
    confidence: 80
    explanation: Godot export templates can be re-downloaded, but projects often pin exact editor/template versions; review before removal.
    source:
      name: Godot
    applies_to:
      bundle_ids:
        - org.godotengine.godot
        - org.godotengine.godot4
        - org.godotengine.godotsharp
        - org.godotengine.godot.mono
    regenerates: true
    tags: [app_pack, godot, game_engine, export_templates]

  - id: godot_project_roots_protected
    name: Godot project roots
    category: other
    path_templates:
      - "~/Godot"
      - "~/Godot Projects"
      - "~/Documents/Godot"
      - "~/Documents/Godot Projects"
    safety: protected
    confidence: 70
    explanation: Common Godot project roots. Protected because they can contain user projects, source, assets, export presets, and version-pinned project state.
    source:
      name: Godot
    applies_to:
      bundle_ids:
        - org.godotengine.godot
        - org.godotengine.godot4
        - org.godotengine.godotsharp
        - org.godotengine.godot.mono
    regenerates: false
    tags: [app_pack, godot, game_engine, projects, protected]
