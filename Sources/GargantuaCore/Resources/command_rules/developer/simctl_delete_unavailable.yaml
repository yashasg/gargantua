rules:
  - id: simctl_delete_unavailable
    name: Xcode Simulator (orphaned runtimes)
    tool: xcrun
    arguments:
      - simctl
      - delete
      - unavailable
    safety: safe
    confidence: 95
    explanation: |
      Removes simulator runtimes Xcode has marked as unavailable, typically
      from older iOS, watchOS, or tvOS releases that are no longer supported
      by the current Xcode install. Xcode owns this data and re-downloads it
      on demand from Settings → Components.
    category: developer_tool_command
    regenerates: true
    regenerate_command: "Xcode → Settings → Components"
    affected_roots:
      - "~/Library/Developer/CoreSimulator/Devices"
      - "~/Library/Developer/CoreSimulator/Volumes"
    preconditions:
      timeout_seconds: 120
    source:
      name: Xcode
      bundle_id: com.apple.dt.Xcode
    tags:
      - xcode
      - simulator
