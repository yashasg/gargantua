version: 1
protected_roots:
  - path: "~"
    reason: "Home directory root"
  - path: "~/Library"
    reason: "User Library root"
  - path: "/"
    reason: "Filesystem root"
  - path: "/Applications"
    reason: "Applications root"
  - path: "/Library"
    reason: "System-wide Library root"
  - path: "/System"
    reason: "System root"
  - path: "/System/Library"
    reason: "macOS system Library root"
  - path: "/System/Volumes"
    reason: "System volumes root"
  - path: "/System/Volumes/Data"
    reason: "System data volume root"
  - path: "/System/Volumes/Data/Library"
    reason: "System-wide Library root"
  - path: "/System/Volumes/Data${HOME}"
    reason: "Home directory root on the macOS data volume"
  - path: "/System/Volumes/Data${HOME}/Library"
    reason: "User Library root on the macOS data volume"
  - path: "/Users"
    reason: "Users root"
  - path: "/private"
    reason: "Private system root"
  - path: "/private/tmp"
    reason: "Temporary directory root"
  - path: "/private/var"
    reason: "Variable system root"
  - path: "/private/var/folders"
    reason: "macOS-managed folders root"
  - path: "/private/var/folders/*/*/C"
    reason: "macOS-managed cache bucket root"
  - path: "/private/var/folders/*/*/T"
    reason: "macOS-managed temp bucket root"
  - path: "/private/var/folders/*/*/X"
    reason: "macOS-managed system bucket root"
  - path: "/tmp"
    reason: "Temporary directory root"
  - path: "/var"
    reason: "Variable system root"
  - path: "/var/folders"
    reason: "macOS-managed folders root"
  - path: "/var/folders/*/*/C"
    reason: "macOS-managed cache bucket root"
  - path: "/var/folders/*/*/T"
    reason: "macOS-managed temp bucket root"
  - path: "/var/folders/*/*/X"
    reason: "macOS-managed system bucket root"
